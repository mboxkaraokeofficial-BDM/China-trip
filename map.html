<html lang="th">
<head>
<meta charset="UTF-8">

<title>🗺 Route Map — China Trip Apr 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1a1008;--paper:#faf6f0;--gold:#c8962a;--jade:#2e7d6b;
  --sky:#2c5f8a;--red:#c0392b;--muted:#8b7355;--line:#d4c4a8;--card:#fff9f0;
}
body{background:var(--paper);color:var(--ink);font-family:'Sarabun',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{background:var(--ink);padding:.6rem 1rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0;flex-wrap:wrap}
.topbar-title{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--paper);font-weight:700;white-space:nowrap}
.topbar-title span{color:var(--gold)}

/* CITY TABS */
.city-tabs{display:flex;gap:.3rem;margin-left:auto}
.city-btn{padding:.3rem .9rem;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.6);
  font-size:.7rem;font-family:'Space Mono',monospace;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap}
.city-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700}
.city-btn:hover:not(.active){background:rgba(255,255,255,.1);color:white}

/* DAY FILTER */
.daybar{background:#111;padding:.4rem 1rem;display:flex;gap:.25rem;overflow-x:auto;flex-shrink:0;align-items:center}
.day-label{font-family:'Space Mono',monospace;font-size:.6rem;color:rgba(255,255,255,.4);white-space:nowrap;margin-right:.25rem}
.day-btn{padding:.25rem .65rem;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);
  font-size:.65rem;font-family:'Space Mono',monospace;cursor:pointer;border-radius:3px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.day-btn.active{color:white;font-weight:700}
.day-btn[data-city="sz"].active{background:var(--sky);border-color:var(--sky)}
.day-btn[data-city="yl"].active{background:var(--jade);border-color:var(--jade)}
.day-btn[data-city="gz"].active{background:var(--red);border-color:var(--red)}

/* MAP */
#map{flex:1;min-height:0}

/* BOTTOM PANEL */
.bottom{background:var(--ink);flex-shrink:0;max-height:220px;overflow-y:auto;border-top:2px solid rgba(255,255,255,.08)}
.place-list{display:flex;flex-direction:column;gap:0}
.place-row{display:grid;grid-template-columns:2.8rem 1.2rem 1fr auto;gap:.3rem .5rem;align-items:start;
  padding:.5rem 1rem;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;transition:background .15s}
.place-row:hover{background:rgba(255,255,255,.05)}
.place-row.highlighted{background:rgba(200,150,42,.12)}
.ptime{font-family:'Space Mono',monospace;font-size:.6rem;color:rgba(255,255,255,.4);padding-top:.1rem}
.pico{font-size:.8rem;padding-top:.05rem}
.pname{font-size:.78rem;color:rgba(255,255,255,.85);font-weight:600;line-height:1.3}
.pnote{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:.1rem;line-height:1.3}
.ptag{font-size:.55rem;padding:.05rem .3rem;border-radius:2px;font-family:'Space Mono',monospace;display:inline-block;margin-top:.15rem}
.tag-free{background:rgba(46,125,107,.2);color:#80cbc4}
.tag-warn{background:rgba(192,57,43,.2);color:#ef9a9a}
.tag-star{background:rgba(200,150,42,.2);color:#ffd54f}
.prat{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--gold);padding-top:.1rem;white-space:nowrap}

/* LEGEND */
.legend{position:absolute;top:10px;right:10px;z-index:1000;background:rgba(26,16,8,.88);
  border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:.6rem .8rem;min-width:120px}
.leg-item{display:flex;align-items:center;gap:.4rem;padding:.15rem 0;font-size:.65rem;color:rgba(255,255,255,.7)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* TYPE COLORS */
.type-transport{background:#607d8b}
.type-culture{background:#9c27b0}
.type-shopping{background:#e91e63}
.type-nature{background:#4caf50}
.type-food{background:#ff5722}
.type-electronics{background:#2196f3}
.type-attraction{background:#ffc107}
.type-hotel{background:#795548}
.type-sightseeing{background:#00bcd4}
.type-architecture{background:#673ab7}
.type-business{background:#f44336}
.type-default{background:#9e9e9e}

/* GROUP BADGE */
.gb{display:inline-block;font-size:.55rem;padding:.04rem .3rem;border-radius:2px;font-family:'Space Mono',monospace;font-weight:700;margin-right:.25rem}
.gb-fair{background:rgba(192,57,43,.2);color:#ef9a9a}
.gb-free{background:rgba(46,125,107,.2);color:#80cbc4}
.gb-all{background:rgba(200,150,42,.2);color:#ffd54f}

/* SUMMARY BAR */
.summary{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);
  padding:.35rem 1rem;display:flex;gap:1.2rem;font-size:.65rem;color:rgba(255,255,255,.5);
  font-family:'Space Mono',monospace;flex-wrap:wrap}
.summary strong{color:rgba(255,255,255,.85)}

@media(max-width:500px){
  .topbar{padding:.5rem .75rem}
  .city-tabs{margin-left:0;width:100%}
  .city-btn{flex:1;text-align:center}
  .legend{display:none}
  .pnote{display:none}
}
</style>
</head>

// ── STATE ─────────────────────────────────────────────
let currentCity = 'sz';
let currentDay  = 1;
let markerMap   = {};
let leafletMap  = null;

// ── MAP INIT ──────────────────────────────────────────
function initMap() {
  leafletMap = L.map('map', {zoomControl:true, scrollWheelZoom:true})
    .setView(CITIES.sz.center, CITIES.sz.zoom);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CARTO', maxZoom:19
  }).addTo(leafletMap);
}

// ── RENDER ────────────────────────────────────────────
function getTypeColor(type) {
  const map = {
    transport:'#607d8b', culture:'#9c27b0', shopping:'#e91e63',
    nature:'#4caf50', food:'#ff5722', electronics:'#2196f3',
    attraction:'#ffc107', hotel:'#795548', sightseeing:'#00bcd4',
    architecture:'#673ab7', business:'#f44336',
  };
  return map[type] || '#9e9e9e';
}

function makeMarkerIcon(type, highlight) {
  const col = getTypeColor(type);
  const sz = highlight ? 36 : 28;
  const icon = TYPE_ICON[type] || '📍';
  const html = `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};
    display:flex;align-items:center;justify-content:center;font-size:${highlight?16:12}px;
    border:${highlight?3:2}px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5);
    transition:all .2s">${icon}</div>`;
  return L.divIcon({html, className:'', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2]});
}

function renderDay() {
  // Clear markers
  Object.values(markerMap).forEach(m => leafletMap.removeLayer(m));
  markerMap = {};

  const city = CITIES[currentCity];
  const days = DAYS[currentCity];
  if (!days) return;

  const dayData = days.find(d => d.day === currentDay);
  if (!dayData) return;

  // Draw route line
  if (window._routeLine) leafletMap.removeLayer(window._routeLine);
  const coords = dayData.places.filter(p=>p.lat).map(p=>[p.lat,p.lng]);
  if (coords.length > 1) {
    window._routeLine = L.polyline(coords, {
      color: city.color, weight:2, dashArray:'5,8', opacity:.6
    }).addTo(leafletMap);
  }

  // Add markers
  dayData.places.forEach((p, i) => {
    if (!p.lat) return;
    const marker = L.marker([p.lat, p.lng], {icon: makeMarkerIcon(p.type, false)})
      .addTo(leafletMap);

    const groupBadge = p.group ? `<span style="font-size:10px;padding:1px 5px;border-radius:2px;margin-right:4px;
      background:${p.group==='fair'?'rgba(192,57,43,.3)':p.group==='free'?'rgba(46,125,107,.3)':'rgba(200,150,42,.3)'}">
      ${p.group==='fair'?'FAIR':p.group==='free'?'FREE':'ALL'}</span>` : '';

    marker.bindPopup(`
      <div style="font-family:system-ui;min-width:160px;max-width:220px">
        <div style="font-size:11px;color:#888;font-family:monospace;margin-bottom:3px">${p.time||''}</div>
        <div style="font-weight:700;font-size:13px;margin-bottom:4px">${groupBadge}${p.name}</div>
        ${p.notes ? `<div style="font-size:11px;color:#555;margin-bottom:3px">${p.notes}</div>` : ''}
        ${p.rating ? `<div style="font-size:11px;color:#c8962a">⭐ ${p.rating}</div>` : ''}
        ${p.alert ? `<div style="font-size:11px;color:#c0392b;font-weight:600;margin-top:3px">⚠️ ${p.alert}</div>` : ''}
        ${p.free ? `<div style="font-size:11px;color:#2e7d6b;margin-top:2px">FREE</div>` : ''}
      </div>
    `, {maxWidth:240});

    marker.on('click', () => highlightRow(i));
    markerMap[i] = marker;
  });

  // Fit bounds
  if (coords.length > 0) {
    const bounds = L.latLngBounds(coords);
    leafletMap.fitBounds(bounds, {padding:[40,40], maxZoom:14});
  }

  renderList(dayData);
  renderSummary(dayData);
  updateLegend(dayData);
}

function renderList(dayData) {
  const list = document.getElementById('placeList');
  list.innerHTML = dayData.places.map((p, i) => {
    const gb = p.group ? `<span class="gb gb-${p.group}">${p.group==='fair'?'FAIR':p.group==='free'?'FREE':'ALL'}</span>` : '';
    let tags = '';
    if (p.free) tags += `<span class="ptag tag-free">FREE</span>`;
    if (p.alert) tags += `<span class="ptag tag-warn">⚠️ ${p.alert}</span>`;
    if (p.award) tags += `<span class="ptag tag-star">${p.award}</span>`;
    return `
      <div class="place-row" id="row-${i}" onclick="clickRow(${i})">
        <div class="ptime">${p.time||''}</div>
        <div class="pico">${TYPE_ICON[p.type]||'📍'}</div>
        <div>
          <div class="pname">${gb}${p.name}</div>
          ${p.notes ? `<div class="pnote">${p.notes}</div>` : ''}
          ${tags ? `<div>${tags}</div>` : ''}
        </div>
        ${p.rating ? `<div class="prat">⭐${p.rating}</div>` : ''}
      </div>`;
  }).join('');
}

function renderSummary(dayData) {
  const places = dayData.places.filter(p=>p.lat).length;
  const free = dayData.places.filter(p=>p.free).length;
  const food = dayData.places.filter(p=>p.type==='food').length;
  const alert = dayData.alert ? `<span style="color:#ef9a9a">⚠️ ${dayData.alert}</span>` : '';
  document.getElementById('summary').innerHTML = `
    <span><strong>${places}</strong> สถานที่</span>
    <span><strong>${food}</strong> ร้านอาหาร</span>
    ${free ? `<span style="color:#80cbc4"><strong>${free}</strong> ฟรี</span>` : ''}
    <span style="color:rgba(255,255,255,.4)">${dayData.date}</span>
    ${alert}
  `;
}

function updateLegend(dayData) {
  const types = [...new Set(dayData.places.map(p=>p.type))];
  const legend = document.getElementById('legend');
  legend.innerHTML = types.map(t => `
    <div class="leg-item">
      <div class="leg-dot" style="background:${getTypeColor(t)}"></div>
      <span>${TYPE_ICON[t]||''} ${t}</span>
    </div>`).join('');
}

function clickRow(i) {
  const dayData = DAYS[currentCity].find(d=>d.day===currentDay);
  if (!dayData) return;
  const p = dayData.places[i];
  if (markerMap[i]) {
    leafletMap.setView([p.lat, p.lng], 15, {animate:true});
    markerMap[i].openPopup();
    // Pulse marker
    markerMap[i].setIcon(makeMarkerIcon(p.type, true));
    setTimeout(()=>{ if(markerMap[i]) markerMap[i].setIcon(makeMarkerIcon(p.type, false)); }, 2000);
  }
  highlightRow(i);
}

function highlightRow(i) {
  document.querySelectorAll('.place-row').forEach(r=>r.classList.remove('highlighted'));
  const row = document.getElementById(`row-${i}`);
  if (row) { row.classList.add('highlighted'); row.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

// ── DAY BAR ───────────────────────────────────────────
function buildDayBar(city) {
  const bar = document.getElementById('daybar');
  const days = DAYS[city];
  bar.innerHTML = `<span class="day-label">Day:</span>` +
    days.map(d => `
      <button class="day-btn ${d.day===currentDay?'active':''}" data-city="${city}" onclick="setDay(${d.day},this)">
        ${d.label}
      </button>`).join('');
}

function setDay(day, btn) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDay();
}

function setCity(city, btn) {
  currentCity = city;
  currentDay = DAYS[city][0].day;
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  leafletMap.setView(CITIES[city].center, CITIES[city].zoom, {animate:true});
  buildDayBar(city);
  renderDay();
}

// ── INIT ─────────────────────────────────────────────
initMap();
buildDayBar('sz');
renderDay();
</script>
</body>
</html>
